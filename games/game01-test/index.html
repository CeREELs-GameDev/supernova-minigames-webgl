<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>고음 훈련 | Supernova Minigames</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
      @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Galmuri11.min.css');

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0D0D1A; overflow: hidden; }

      #unity-container { position: fixed; width: 100%; height: 100%; }
      #unity-canvas { background: #0D0D1A; width: 100%; height: 100%; }

      /* Custom loading overlay */
      #loading-overlay {
        position: fixed; inset: 0; z-index: 10;
        background: #0D0D1A;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: 'Galmuri11', monospace;
        transition: opacity 0.4s ease;
      }
      #loading-overlay.fade-out { opacity: 0; pointer-events: none; }

      @keyframes pulse { 0%,100% { opacity: 0.4 } 50% { opacity: 1 } }
      @keyframes twinkle { 0%,100% { opacity: 0.2 } 50% { opacity: 0.8 } }

      .loading-title {
        font-size: 24px; font-weight: 700; color: #FFD700;
        text-shadow: 2px 2px 0 #E84070, -1px -1px 0 #C87BDB, 0 0 12px rgba(255,215,0,0.3);
        letter-spacing: 3px;
        margin-bottom: 6px;
      }
      .loading-sub {
        font-size: 11px; color: #8B9EF0;
        letter-spacing: 4px; margin-bottom: 32px;
      }

      /* Progress bar */
      .progress-track {
        width: 200px; height: 6px;
        background: #1A1A2E;
        border-radius: 3px;
        border: 1px solid #3A3A5C;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .progress-fill {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #E84070, #C87BDB, #FFD700);
        border-radius: 3px;
        transition: width 0.2s ease;
      }

      .loading-percent {
        font-size: 11px; color: #4A4A6C;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }

      /* Stars */
      .star {
        position: fixed; width: 2px; height: 2px;
        background: #fff; border-radius: 50%;
      }
      .s1 { top: 12%; left: 18%; animation: twinkle 2s infinite; }
      .s2 { top: 8%; right: 22%; animation: twinkle 3s infinite 0.5s; background: #FFD700; }
      .s3 { bottom: 15%; left: 30%; animation: twinkle 2.5s infinite 1s; background: #FF69B4; }
      .s4 { top: 35%; right: 10%; animation: twinkle 4s infinite 0.3s; }
      .s5 { bottom: 25%; right: 35%; animation: twinkle 2s infinite 1.5s; background: #87CEEB; }
      .s6 { top: 22%; left: 42%; animation: twinkle 3s infinite 0.8s; background: #C87BDB; }
      .s7 { bottom: 40%; left: 12%; animation: twinkle 3.5s infinite 0.2s; }
      .s8 { top: 55%; right: 15%; animation: twinkle 2.8s infinite 1.2s; background: #FFD700; }

      /* Footer */
      #unity-footer {
        position: fixed; bottom: 0; left: 0; right: 0;
        height: 38px; background: #0D0D1A;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 10px; z-index: 5;
      }
      .unity-mobile #unity-footer { display: none; }
      #unity-fullscreen-button {
        cursor: pointer; width: 38px; height: 38px;
        background: url('TemplateData/fullscreen-button.png') no-repeat center;
      }
      #unity-build-title {
        font-family: 'Galmuri11', monospace;
        font-size: 12px; color: #4A4A6C;
      }

      #unity-warning {
        position: fixed; left: 50%; top: 5%;
        transform: translateX(-50%);
        background: #1A1A2E; color: #fff;
        padding: 10px 16px; border-radius: 6px;
        border: 1px solid #E84070;
        font-family: 'Galmuri11', monospace; font-size: 12px;
        display: none; z-index: 20;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <!-- Custom loading overlay -->
      <div id="loading-overlay">
        <div class="star s1"></div><div class="star s2"></div>
        <div class="star s3"></div><div class="star s4"></div>
        <div class="star s5"></div><div class="star s6"></div>
        <div class="star s7"></div><div class="star s8"></div>

        <div class="loading-title">SUPERNOVA</div>
        <div class="loading-sub">MINIGAMES</div>

        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="loading-percent" id="loading-percent">LOADING...</div>
      </div>

      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-build-title">Supernova Minigames</div>
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var overlay = document.querySelector("#loading-overlay");
      var progressFill = document.querySelector("#progress-fill");
      var loadingPercent = document.querySelector("#loading-percent");

      // App → Game message queue (Unity 준비 전 도착한 메시지 보관)
      var _unityInstance = null;
      var _messageQueue = [];

      function handleAppMessage(event) {
        try {
          var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
          if (!data || !data.type) return;

          if (_unityInstance) {
            routeMessage(data);
          } else {
            _messageQueue.push(data);
          }
        } catch (err) {}
      }

      function routeMessage(data) {
        if (data.type === 'GAME_SETTINGS') {
          _unityInstance.SendMessage('WebBridge', 'ReceiveSettings', JSON.stringify(data));
        } else if (data.type === 'LEADERBOARD') {
          _unityInstance.SendMessage('WebBridge', 'ReceiveLeaderboard', JSON.stringify(data));
        }
      }

      // 즉시 리스너 등록 — WebView 로드 직후 앱 메시지 수신 가능
      window.addEventListener('message', handleAppMessage);
      document.addEventListener('message', handleAppMessage);

      // WebGL AudioContext resume — 일부 브라우저/WebView에서 유저 인터랙션 전까지 오디오 차단됨
      document.addEventListener('click', function resumeAudio() {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          var ctx = new AudioCtx();
          ctx.resume().then(function() { ctx.close(); });
        }
        if (_unityInstance && _unityInstance.Module && _unityInstance.Module.resumeAudio) {
          _unityInstance.Module.resumeAudio();
        }
        document.removeEventListener('click', resumeAudio);
      }, { once: true });

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: #E84070; padding: 10px; border-radius: 4px;';
        else {
          if (type == 'warning') div.style = 'background: #C87BDB; padding: 10px; border-radius: 4px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/7884534c70654c343437e5728bf54f51.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/800f279657de602d86bda3ae66fef674.data.unityweb",
        frameworkUrl: buildUrl + "/df5c535b7afc4ec80095128553aa1d91.framework.js.unityweb",
        codeUrl: buildUrl + "/d3905ccc473a2c548a28d622da0357c4.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CeREELs",
        productName: "Supernova Minigames",
        productVersion: "0.3.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          var pct = Math.round(progress * 100);
          progressFill.style.width = pct + "%";
          loadingPercent.textContent = pct + "%";
        }).then((unityInstance) => {
          _unityInstance = unityInstance;

          // Fade out loading overlay
          overlay.classList.add("fade-out");
          setTimeout(() => { overlay.style.display = "none"; }, 400);

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };

          // 큐에 쌓인 메시지 재생
          _messageQueue.forEach(function (data) { routeMessage(data); });
          _messageQueue = [];
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
