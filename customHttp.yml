customHeaders:
  - pattern: '**/*.wasm'
    headers:
      - key: Content-Type
        value: application/wasm
  - pattern: '**/*.br'
    headers:
      - key: Content-Encoding
        value: br
      - key: Content-Type
        value: application/wasm
  - pattern: '**/*.gz'
    headers:
      - key: Content-Encoding
        value: gzip
  - pattern: '**/*'
    headers:
      - key: Cross-Origin-Opener-Policy
        value: same-origin
      - key: Cross-Origin-Embedder-Policy
        value: require-corp
